name: Bug report
description: Report an error or incorrect behavior in a benchmark task, fixture, or oracle.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Pull requests are not accepted on this repository;
        please describe the problem here and the author will address it at their
        discretion.
  - type: input
    id: location
    attributes:
      label: Affected task / fixture / oracle
      description: Which path is affected (e.g. tasks/brownfield/005-sqlite-join-bug.yaml)?
      placeholder: benchmarks/cli-comparison/...
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What's wrong
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Commands run, environment, and observed output.
    validations:
      required: false
