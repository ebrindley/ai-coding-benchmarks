# Greenfield Task: Rust Reverse-Polish-Notation Calculator
#
# Category: Feature (from-scratch)
# Language: Rust (standard library only)
# Complexity: Medium
# Estimated Time: 30 minutes

taskId: greenfield-008-rust-rpn-calculator
type: greenfield
codeType: from-scratch
category: feature
language: rust
description: |
  Implement eval in src/lib.rs: a reverse-Polish-notation calculator over
  whitespace-separated tokens. Tokens are integers (possibly negative) or one of
  + - * /. Evaluate with a stack; for an operator pop two values where the
  second-popped is the left operand. Division is integer division.

  Return Err with these exact messages:
  - "empty expression" for blank input
  - "stack underflow" when an operator has fewer than two operands
  - "division by zero"
  - "invalid token: <token>" for an unrecognized token
  - "invalid expression" when more than one value remains at the end

  Use only the standard library. Do not change the eval signature; do not edit
  the #[cfg(test)] module. src/main.rs is a provided CLI wrapper.
complexity: medium

expectedOutcome:
  mustHave:
    - id: basic-arithmetic
      description: Add/subtract/multiply/divide with correct operand order
      substantiation: test
      artifactRef: src/lib.rs::tests::multiplication_and_addition
    - id: integer-division
      description: Division is integer division
      substantiation: test
      artifactRef: src/lib.rs::tests::integer_division
    - id: negative-numbers
      description: Negative integer literals parse correctly
      substantiation: test
      artifactRef: src/lib.rs::tests::negative_numbers
    - id: error-contract
      description: Empty, underflow, divide-by-zero, invalid-token, leftover errors
      substantiation: test
      artifactRef: src/lib.rs::tests::divide_by_zero_is_error

  successCriteria:
    - All tests pass
    - cargo build is clean
    - No crates added (empty dependencies table)

