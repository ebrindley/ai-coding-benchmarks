      description: Store still preserves raw category labels (not normalized away)
      substantiation: test
      artifactRef: tests/test_store.py::TestStore::test_category_preserved_verbatim

    - id: cache-exact-match-preserved
      description: Cache invalidation stays exact-match (not weakened to fuzzy match)
      substantiation: test
      artifactRef: tests/test_cache.py::TestTagInvalidation::test_invalidate_tag_is_exact_match

  successCriteria:
    - All must-have tests pass
    - No stale reads after restock/sell/add/remove
    - Fix coordinates store (raw) -> normalize (canonical) -> cache (tag) in service

