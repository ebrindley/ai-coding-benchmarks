  description: Spring Boot order/inventory service with a lost-update concurrency bug
  bugLocation: src/main/java/com/example/OrderService.java::placeOrder
  spansLayers: OrderController -> OrderService -> ProductRepository/OrderRepository
  testFramework: JUnit 5 + Spring Boot Test (MockMvc)
  concurrencyTest: OrderConcurrencyTest spawns 64 threads x 25 rounds; a CyclicBarrier on the product read forces read-check-write overlap
  testCount: 7 tests (2 concurrency, 5 functional MockMvc)
  deterministicPattern: CyclicBarrier gathers all readers before any write, deterministically surfacing the lost-update race; each concurrency test also asserts persisted-order count equals confirmed reservations
