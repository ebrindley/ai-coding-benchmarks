    expectedExitCode: 0
    order: 3

  - gate: synchronization
    check: Fix introduces a concurrency-control mechanism
    command: bash scripts/check-synchronization.sh
    expectedExitCode: 0
    order: 4

  - gate: tests
    check: All tests pass (including the concurrency tests)
    command: mvn test -q
    expectedExitCode: 0
    order: 5

  - gate: requirements
    check: All must_have items substantiated
    order: 6

