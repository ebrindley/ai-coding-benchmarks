    command: npm install --no-audit --no-fund --package-lock=false
    expectedExitCode: 0
    order: 2

  - gate: no-test-edits
    check: No test files modified (fix must be proven by the shipped tests)
    command: node scripts/check-no-test-edits.mjs
    expectedExitCode: 0
    order: 3

  - gate: typecheck
    check: TypeScript compiles without errors
    command: npx tsc --noEmit
    expectedExitCode: 0
    order: 4

  - gate: lint
    check: No ESLint errors
    command: npx eslint src/ tests/
    expectedExitCode: 0
    order: 5

  - gate: tests
    check: All tests pass
    command: npm test
    expectedExitCode: 0
    order: 6

  - gate: requirements
    check: All must_have items substantiated by test results
    order: 7

scoring:
  delivery:
    weight: 0.4
    evidence:
      - diff
      - file_changes
  correctness:
    weight: 0.4
    evidence:
      - test_results
  quality:
    weight: 0.2
    evidence:
