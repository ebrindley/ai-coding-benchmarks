  provenanceRequired: true
  record:
    - urls
    - timestamps
    - content_hash

fixturePath: ts-event-store

# Fixture details
fixture:
  description: Event-sourced account ledger with an inclusive/exclusive read-boundary bug
  bugLocation: src/event-store.ts::readStream()
  testFramework: Jest
  spansFiles:
    - src/event-store.ts
    - src/account-repository.ts
    - src/balance-projection.ts
    - src/account.ts
  masking: Full replay from version 0 is correct; only snapshot/checkpoint paths fail

